<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCKETS BUCKET | Pro v65 Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.85);
            --text-dark: #1d1d1f;
            --text-grey: #8e8e93;
            --apple-ease: cubic-bezier(0.4, 0, 0.2, 1);
            --apple-spring: cubic-bezier(0.175, 0.885, 0.32, 1.15); /* Untuk efek membal halus */
        }

        /* --- GLOBAL RESET & SMOOTHNESS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--ios-bg); color: var(--text-dark); height: 100vh; overflow: hidden; scroll-behavior: smooth; }

        /* --- KEYFRAMES ANIMASI SLIDE-IN --- */
        @keyframes slideInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideInUp 0.7s var(--apple-ease) forwards; }

        /* --- TAMPILAN MONITOR TV --- */
        #vDisplay { display: none; height: 100vh; grid-template-rows: 90px 1fr; padding: 25px; gap: 25px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: var(--glass); backdrop-filter: blur(25px); border-radius: 20px; box-shadow: 0 4px 30px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.5); }
        
        .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; height: 100%; overflow: hidden; }
        .card-monitor { background: var(--glass); backdrop-filter: blur(25px); border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.6); overflow: hidden; position: relative; }
        
        /* Anti-Pecah untuk Nomor Antrean */
        .num-main { font-family: 'Orbitron'; font-size: clamp(6rem, 15vw, 13rem); font-weight: 700; color: var(--text-dark); line-height: 0.9; margin: 15px 0; letter-spacing: -3px; }
        .tag-loket { background: var(--ios-blue); color: white; padding: 12px 45px; border-radius: 100px; font-weight: 700; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,122,255,0.3); }

        /* Anti-Pecah & Anti-Keluar Garis untuk QR Code */
        .qr-card-black { background: #000; overflow: hidden; border: 12px solid white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .qr-card-black img { max-width: 90%; max-height: 90%; object-fit: contain; }

        /* --- ZOOM CALL POPUP (ULTRA SMOOTH) --- */
        #zoomOverlay { position: fixed; inset: 0; z-index: 9999; display: none; align-items: center; justify-content: center; background: rgba(242, 242, 247, 0.85); backdrop-filter: blur(40px); opacity: 0; transition: opacity 0.6s var(--apple-ease); }
        .zoom-card { background: white; padding: 70px 110px; border-radius: 60px; text-align: center; box-shadow: 0 50px 120px rgba(0,0,0,0.12); border: 1px solid #ddd; transform: scale(0.65) translateY(30px); transition: transform 0.7s var(--apple-spring), opacity 0.7s; opacity: 0; }
        #zoomOverlay.visible { display: flex; opacity: 1; }
        #zoomOverlay.visible .zoom-card { transform: scale(1) translateY(0); opacity: 1; }

        /* --- PANEL KONTROL ADMIN (UI MODERN) --- */
        #vControl { display: none; flex-direction: column; align-items: center; padding: 30px; overflow-y: auto; gap: 15px; }
        
        /* Kartu Sapaan */
        .greet-card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 25px; margin-bottom: 10px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #eee; }
        
        /* Desain Tombol & Animasi Tekan */
        .btn { width: 100%; max-width: 450px; padding: 22px; border-radius: 22px; border: none; font-weight: 700; cursor: pointer; font-size: 1.1rem; position: relative; transition: all 0.3s var(--apple-ease); box-shadow: 0 10px 25px rgba(0,0,0,0.06); }
        .btn::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.1); border-radius: inherit; opacity: 0; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.96) translateY(1px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn:active::after { opacity: 1; } /* Efek micro-transisi saat ditekan */

        /* Input Prioritas */
        .input-prio { width: 100%; max-width: 450px; padding: 22px; border-radius: 20px; border: 2px solid #e5e5ea; background: white; text-align: center; font-size: 2.2rem; font-family: 'Orbitron'; font-weight: 700; margin: 10px 0; outline: none; transition: 0.3s; color: var(--text-dark); }
        .input-prio:focus { border-color: var(--ios-blue); box-shadow: 0 0 15px rgba(0,122,255,0.1); }
        .input-prio::placeholder { color: #d1d1d6; font-size: 1.5rem; }

        /* --- LOKET TUTUP & SLEEP MODE --- */
        #closedScreen { position: fixed; inset: 0; background: #FFCC00; z-index: 9500; display: none; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; opacity: 0; }
        #closedScreen.visible { display: flex; opacity: 1; }
        #sleepOverlay { position: fixed; inset: 0; background: black; z-index: 10000; display: none; align-items: center; justify-content: center; cursor: pointer; color: #222; font-family: Orbitron; font-size: 1.5rem; transition: opacity 0.8s; opacity: 0; }
        #sleepOverlay.visible { display: flex; opacity: 1; }
    </style>
</head>
<body>

    <div id="sleepOverlay" onclick="wakeUp()"><h2>TOUCH TO WAKE UP</h2></div>

    <div id="vHome" class="slide-in" style="position:fixed; inset:0; background:#fff; z-index:9000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:25px; padding:40px;">
        <h1 style="font-family:Orbitron; font-size:2.8rem; letter-spacing:5px; color:var(--text-dark);">ROCKETS</h1>
        <p style="color:var(--text-grey); margin-bottom:20px;">Sistem Antrean Premium v65</p>
        <button class="btn" style="background:var(--ios-blue); color:white;" onclick="init('display')">BUKA LAYAR MONITOR TV</button>
        <button class="btn" style="background:#e5e5ea; color:var(--text-dark);" onclick="init('control')">BUKA PANEL ADMIN HP</button>
    </div>

    <main id="vDisplay">
        <header>
            <h2 style="font-family:Orbitron; color:var(--ios-blue); font-size:2rem;">ROCKETS</h2>
            <div id="clock" style="font-family:Orbitron; color:var(--text-grey); font-size:1.6rem;">00:00:00</div>
        </header>
        <div class="main-container">
            <div class="card-monitor slide-in" style="animation-delay: 0.1s;">
                <p style="font-weight:700; color:var(--text-grey); letter-spacing:4px; font-size:1.1rem; margin-bottom:10px;">ANTREAN SEKARANG</p>
                <div id="mainNum" class="num-main">D-000</div>
                <div class="tag-loket">LOKET 1</div>
            </div>
            <div class="card-monitor qr-card-black slide-in" style="animation-delay: 0.3s;">
                <img src="cu.png" alt="QR Code Link">
                <p style="color:white; font-size:0.75rem; margin-top:15px; font-family:Orbitron; opacity:0.6; letter-spacing:1px;">SCAN UNTUK MELACAK</p>
            </div>
        </div>
        
        <div id="zoomOverlay">
            <div class="zoom-card">
                <p style="color:var(--ios-blue); font-weight:700; letter-spacing:5px; margin-bottom:15px;">SILAHKAN MASUK</p>
                <h1 id="zoomNum" style="font-size:12rem; font-family:Orbitron; line-height:1; color:var(--text-dark);">D-000</h1>
            </div>
        </div>
        
        <div id="closedScreen">
            <img src="ci.jpg" style="width:300px; border-radius:30px; box-shadow:0 15px 40px rgba(0,0,0,0.1);">
            <h1 style="font-family:Orbitron; font-size:3.5rem; color:var(--text-dark); margin-top:35px;">LOKET TUTUP</h1>
        </div>
    </main>

    <main id="vControl">
        <div class="greet-card slide-in">
            <h3 id="adminGreet" style="color:var(--ios-blue); font-family:Orbitron;">HELLO ADMIN</h3>
            <p style="font-size:0.9rem; color:var(--text-grey); margin-top:5px;">Rockets Control Center v65</p>
        </div>
        <button class="btn slide-in" style="background:var(--ios-blue); color:white; animation-delay:0.1s;" onclick="callNext()">PANGGIL BERIKUTNYA</button>
        
        <div class="greet-card slide-in" style="animation-delay:0.2s;">
            <p style="font-size:0.8rem; font-weight:700; color:var(--text-grey); margin-bottom:10px; text-align:center;">PANGGILAN PRIORITAS</p>
            <input type="number" id="prioInput" class="input-prio" placeholder="Masukkan Angka">
            <button class="btn" style="background:#34c759; color:white; margin:0;" onclick="callPrio()">PANGGIL NOMOR INI</button>
        </div>

        <button id="bgmBtn" class="btn slide-in" style="background:#5856d6; color:white; animation-delay:0.3s;" onclick="toggleBGM()">🎵 MUSIK TENANG: MATI</button>
        <button id="muteBtn" class="btn slide-in" style="background:#ff9500; color:white; animation-delay:0.4s;" onclick="toggleMute()">🔇 MUTE SUARA: MATI</button>
        <button class="btn slide-in" style="background:#ff3b30; color:white; animation-delay:0.5s;" onclick="stopCall()">⏹ STOP PANGGILAN</button>
        <button id="closeBtn" class="btn slide-in" style="background:#1d1d1f; color:white; animation-delay:0.6s;" onclick="toggleTutup()">LOKET TUTUP</button>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = { databaseURL: "https://rockets-442e4-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(config);
        const db = getDatabase(app);
        const fbRef = ref(db, 'rockets_final_v65');

        let mode, state, lastActive = Date.now(), isMuted = false, callCount = 0;
        
        // Musik Ringtone Relaksasi
        const bgm = new Audio('https://assets.mixkit.co/music/preview/mixkit-serene-view-443.mp3');
        bgm.loop = true; bgm.volume = 0.2;

        window.init = (m) => {
            mode = m;
            document.getElementById('vHome').style.display = 'none';
            document.getElementById('v' + m.charAt(0).toUpperCase() + m.slice(1)).style.display = (m==='display'?'grid':'flex');
            
            if(m === 'display') {
                setInterval(checkSleep, 10000);
                setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
                window.wakeUp(); // Reset lastActive saat monitor dibuka
            }
            if(m === 'control') document.getElementById('adminGreet').innerText = getGreeting().toUpperCase();
        };

        function getGreeting() {
            const h = new Date().getHours();
            if(h < 11) return "Pagi";
            if(h < 15) return "Siang";
            if(h < 18) return "Sore";
            return "Malam";
        }

        function checkSleep() {
            if(Date.now() - lastActive > 600000) { // 10 Menit diam = Sleep
                document.getElementById('sleepOverlay').classList.add('visible');
            }
        }
        window.wakeUp = () => { lastActive = Date.now(); document.getElementById('sleepOverlay').classList.remove('visible'); };

        onValue(fbRef, (snap) => {
            state = snap.val() || { cur: 0, isCalling: false, isClosed: false };
            lastActive = Date.now();
            if(document.getElementById('sleepOverlay').classList.contains('visible')) {
                 document.getElementById('sleepOverlay').classList.remove('visible');
            }
            
            if(mode === 'display') {
                const n = "D-" + String(state.cur).padStart(3, '0');
                document.getElementById('mainNum').innerText = n;
                document.getElementById('zoomNum').innerText = n;
                if(state.isClosed) {
                     document.getElementById('closedScreen').classList.add('visible');
                } else {
                     document.getElementById('closedScreen').classList.remove('visible');
                }

                if(state.isCalling && !state.isClosed) {
                    const z = document.getElementById('zoomOverlay');
                    z.classList.add('visible');
                    playVoice(state.cur);
                } else {
                    const z = document.getElementById('zoomOverlay');
                    z.classList.remove('visible');
                    window.speechSynthesis.cancel();
                }
            }

            if(mode === 'control') {
                document.getElementById('closeBtn').innerText = state.isClosed ? "BUKA LOKET" : "LOKET TUTUP";
                document.getElementById('closeBtn').style.background = state.isClosed ? "#34c759" : "#1d1d1f";
            }
        });

        window.callNext = () => update(fbRef, { cur: (state.cur || 0) + 1, isCalling: true });
        window.callPrio = () => {
            const v = document.getElementById('prioInput').value;
            if(v) update(fbRef, { cur: parseInt(v), isCalling: true });
        };
        window.stopCall = () => update(fbRef, { isCalling: false });
        window.toggleMute = () => {
            isMuted = !isMuted;
            document.getElementById('muteBtn').innerText = "🔇 MUTE: " + (isMuted ? "AKTIF" : "MATI");
            document.getElementById('muteBtn').style.background = isMuted ? "#d1d1d6" : "#ff9500";
        };
        window.toggleBGM = () => {
            if(bgm.paused) { bgm.play(); document.getElementById('bgmBtn').innerText = "🎵 MUSIK: AKTIF"; document.getElementById('bgmBtn').style.background = "#d1d1d6"; }
            else { bgm.pause(); document.getElementById('bgmBtn').innerText = "🎵 MUSIK: MATI"; document.getElementById('bgmBtn').style.background = "#5856d6"; }
        };
        window.toggleTutup = () => update(fbRef, { isClosed: !state.isClosed, isCalling: false });

        function playVoice(n) {
            if(isMuted) return;
            window.speechSynthesis.cancel();
            callCount = 0;
            const msg = new SpeechSynthesisUtterance("Nomor antrean D " + n + ". Silahkan masuk.");
            msg.lang = 'id-ID';
            msg.rate = 0.9;
            msg.onend = () => {
                callCount++;
                if(callCount < 5 && state.isCalling) {
                    setTimeout(() => { if(state.isCalling) window.speechSynthesis.speak(msg); }, 2000);
                } else if(callCount >= 5) {
                    update(fbRef, { isCalling: false });
                }
            };
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
